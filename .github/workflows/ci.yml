name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run conformance tests
        run: python -m unittest discover -s tests
        env:
          PYTHONPATH: src
      - name: Check release budgets
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          assert len(Path("GTP.md").read_text(encoding="utf-8").splitlines()) <= 400
          assert len(Path("README.md").read_text(encoding="utf-8").splitlines()) <= 150
          production = sum(
              len(path.read_text(encoding="utf-8").splitlines())
              for path in Path("src/gtp").glob("*.py")
          )
          assert production <= 2500
          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          assert project["dependencies"] == []
          PY
      - name: Build sdist and wheel without network
        run: |
          mkdir dist
          python -c 'import build_backend; print(build_backend.build_sdist("dist")); print(build_backend.build_wheel("dist"))'
      - name: Install Twine runtime probe
        run: python -m pip install twine==6.2.0
      - name: Probe Twine runtime wiring
        run: python -m twine --version
      - name: Install wheel in clean environment
        run: |
          python -m venv .venv-check
          .venv-check/bin/python -m pip install --no-index --no-deps dist/*.whl
      - name: Smoke test installed CLI
        run: |
          .venv-check/bin/gtp check tests/fixtures/carriers/contract-valid.md
          .venv-check/bin/python -c 'import subprocess; result = subprocess.run([".venv-check/bin/gtp", "status", "not-a-github-issue-url"]); raise SystemExit(0 if result.returncode == 2 else 1)'
