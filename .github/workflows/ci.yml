name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run conformance tests
        run: python -m unittest discover -s tests
        env:
          PYTHONPATH: src
      - name: Build wheel
        run: python -m pip wheel --no-build-isolation --no-deps --wheel-dir dist .
      - name: Install wheel
        run: python -m pip install --no-index --find-links dist github-task-protocol
      - name: Smoke test installed CLI
        run: |
          gtp check tests/fixtures/carriers/contract-valid.md
          gtp status https://github.com/shinya0x00/github-task-protocol/issues/1
